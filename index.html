<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUKU YETU - Premium Poultry Products</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Favicon - prevents 404 errors -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
    
    <!-- Preconnect to backend for faster loading -->
    <link rel="preconnect" href="https://kuku-backend-ntr4.onrender.com">
    
    <style>
        /* Quick inline styles to prevent layout shift */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        .spinner-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }
        .page-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .page-btn.active {
            background: #ff6b00;
            color: white;
            border-color: #ff6b00;
        }
    </style>
</head>
<body>

<!-- ============== LOADING OVERLAY ============== -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading KUKU YETU...</div>
    </div>
</div>

<!-- ============== SIDE NAVIGATION ============== -->
<div class="side-nav" id="sideNav">
    <div class="side-nav-header">
        <h3>Menu</h3>
        <i class="fas fa-times close-nav" onclick="toggleSideNav()"></i>
    </div>
    <div class="side-nav-content">
        <div class="side-nav-section">
            <h4>Categories</h4>
            <ul class="category-list">
                <li onclick="filterProducts('broilers')"><i class="fas fa-drumstick-bite"></i> Broilers</li>
                <li onclick="filterProducts('layers')"><i class="fas fa-egg"></i> Layers</li>
                <li onclick="filterProducts('eggs')"><i class="fas fa-egg"></i> Eggs</li>
                <li onclick="filterProducts('chicks')"><i class="fas fa-seedling"></i> Chicks</li>
            </ul>
        </div>
        <div class="side-nav-section">
            <h4>Support</h4>
            <ul>
                <li onclick="openWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp Channel</li>
                <li onclick="callSupport()"><i class="fas fa-headset"></i> Support Center</li>
            </ul>
        </div>
    </div>
</div>

<!-- ============== NOTIFICATION PANEL ============== -->
<div class="notification-panel" id="notificationPanel">
    <div class="notification-header">
        <h3>Notifications</h3>
        <i class="fas fa-times close-notification" onclick="toggleNotification()"></i>
    </div>
    <div class="notification-list" id="notificationList">
        <!-- Notifications loaded dynamically -->
    </div>
</div>

<!-- ============== MAIN CONTENT ============== -->
<div class="app-container">
    
    <!-- ============== HEADER ============== -->
    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger" onclick="toggleSideNav()"></i>
            <h1 class="logo">KUKU YETU</h1>
        </div>
        <div class="header-right">
            <i class="fas fa-bell notification-icon" onclick="toggleNotification()"></i>
            <span class="notification-badge" id="notificationBadge">0</span>
            <i class="fas fa-whatsapp whatsapp-icon" onclick="openWhatsApp()"></i>
            <i class="fas fa-headset support-icon" onclick="callSupport()"></i>
        </div>
    </header>

    <!-- ============== SEARCH SECTION ============== -->
    <div class="search-section">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search products by name or ID..." onkeyup="searchProducts()">
        </div>
    </div>

    <!-- ============== CATEGORIES FILTER ============== -->
    <div class="categories-filter">
        <button class="filter-btn active" onclick="filterProducts('all')">All</button>
        <button class="filter-btn" onclick="filterProducts('broilers')">Broilers</button>
        <button class="filter-btn" onclick="filterProducts('layers')">Layers</button>
        <button class="filter-btn" onclick="filterProducts('eggs')">Eggs</button>
        <button class="filter-btn" onclick="filterProducts('chicks')">Chicks</button>
    </div>

    <!-- ============== PRODUCTS GRID ============== -->
    <div class="products-grid" id="productsGrid">
        <!-- Products loaded dynamically -->
    </div>

    <!-- ============== PAGINATION ============== -->
    <div id="pagination" class="pagination"></div>

    <!-- ============== PRODUCT MODAL ============== -->
    <div class="product-modal" id="productModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProductModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image-section">
                    <div class="image-slider" id="imageSlider">
                        <!-- Images loaded dynamically -->
                    </div>
                    <div class="slider-dots" id="sliderDots"></div>
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle"></h2>
                    <div class="modal-prices">
                        <span class="current-price" id="modalPrice"></span>
                        <span class="old-price" id="modalOldPrice"></span>
                    </div>
                    <div class="modal-rating" id="modalRating"></div>
                    <p class="modal-description" id="modalDescription"></p>
                    <div class="modal-actions">
                        <button class="save-btn" onclick="toggleFavorite()">
                            <i class="far fa-heart"></i> Save for later
                        </button>
                        <button class="checkout-btn" onclick="proceedToCheckout()">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============== AUTH MODAL ============== -->
    <div class="auth-modal" id="authModal">
        <div class="auth-content">
            <span class="close-auth" onclick="closeAuthModal()">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="auth-submit">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required minlength="6">
                </div>
                <button type="submit" class="auth-submit">Register</button>
            </form>
        </div>
    </div>

    <!-- ============== CART MODAL ============== -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <span class="close-cart" onclick="closeCartModal()">&times;</span>
            <h2>Your Cart</h2>
            <div class="cart-items" id="cartItems">
                <!-- Cart items loaded dynamically -->
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">KSh 0</span>
            </div>
            <div class="cart-location">
                <h3>Delivery Location</h3>
                <div class="location-input">
                    <input type="text" id="locationInput" placeholder="Click to get location" readonly onclick="getUserLocation()">
                    <i class="fas fa-location-dot" onclick="getUserLocation()"></i>
                </div>
                <textarea id="specificAddress" placeholder="Specific address or delivery notes"></textarea>
            </div>
            <div class="cart-actions">
                <button class="confirm-order" onclick="confirmOrder()">Confirm Order (Pay on Delivery)</button>
                <button class="whatsapp-order" onclick="sendOrderViaWhatsApp()">
                    <i class="fab fa-whatsapp"></i> Confirm via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- ============== BOTTOM NAVIGATION ============== -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.reload()">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="showCategories()">
            <i class="fas fa-th-large"></i>
            <span>Categories</span>
        </div>
        <div class="nav-item" onclick="openCart()">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
        <div class="nav-item" onclick="showFavorites()">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </div>
        <div class="nav-item" onclick="showAbout()">
            <i class="fas fa-info-circle"></i>
            <span>About</span>
        </div>
        <div class="nav-item" onclick="showProfile()">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
    </nav>
</div>

<!-- ============== SCRIPTS ============== -->
<!-- Load in correct order -->
<script src="js/api.js"></script>
<script src="js/main.js"></script>

<!-- ============== FALLBACKS AND SAFEGUARDS ============== -->
<script>
    (function() {
        // Ensure all required functions exist (prevents "not defined" errors)
        const requiredFunctions = [
            'filterProducts', 'toggleSideNav', 'toggleNotification', 'openWhatsApp', 
            'callSupport', 'showCategories', 'openCart', 'closeCartModal', 
            'showFavorites', 'showAbout', 'showProfile', 'addToCart', 
            'proceedToCheckout', 'confirmOrder', 'getUserLocation', 
            'sendOrderViaWhatsApp', 'logout', 'openAuthModal', 'closeAuthModal',
            'switchAuthTab', 'handleLogin', 'handleRegister', 'openProductModal',
            'closeProductModal', 'searchProducts'
        ];
        
        requiredFunctions.forEach(funcName => {
            if (typeof window[funcName] !== 'function') {
                console.warn(`Function ${funcName} not loaded yet, creating placeholder`);
                window[funcName] = function() {
                    console.log(`Placeholder ${funcName} called - waiting for main.js`);
                };
            }
        });
        
        // Hide loading overlay after timeout (safety)
        setTimeout(function() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay && overlay.style.display !== 'none') {
                console.log('Force hiding loading overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }
        }, 5000);
        
        // Log when page is ready
        console.log(' loaded, waiting for scripts...');
    })();
</script>

<!-- ============== ADDITIONAL SAFETY FOR SEARCH ============== -->
<script>
    // Ensure search function works even if main.js hasn't loaded yet
    window.searchProducts = window.searchProducts || function() {
        console.log('Search triggered');
        const searchTerm = document.getElementById('searchInput')?.value;
        // Dispatch custom event that main.js can listen for
        const event = new CustomEvent('searchProducts', { detail: { search: searchTerm } });
        document.dispatchEvent(event);
    };
</script>

</body>
</html>
